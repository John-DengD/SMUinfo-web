name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: server/go.sum

      - name: Build static Linux binary
        run: |
          cd server
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o smudeal ./cmd/smudeal

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_SSH_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload binary and migrations
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'root' }}
        run: |
          scp -P "$DEPLOY_PORT" -i ~/.ssh/deploy_key \
            server/smudeal \
            "$DEPLOY_USER@$DEPLOY_HOST:/tmp/smudeal"
          scp -P "$DEPLOY_PORT" -i ~/.ssh/deploy_key -r \
            server/internal/db/migrations \
            "$DEPLOY_USER@$DEPLOY_HOST:/tmp/smudeal-migrations"

      - name: Deploy and restart service
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'root' }}
          APP_DIR: ${{ secrets.APP_DIR || '/opt/smu-deal' }}
          SERVICE_NAME: ${{ secrets.SERVICE_NAME || 'smu-deal.service' }}
        run: |
          ssh -p "$DEPLOY_PORT" -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -eu
             mkdir -p '$APP_DIR/migrations'
             if [ -f '$APP_DIR/smudeal' ]; then
               cp '$APP_DIR/smudeal' '$APP_DIR/smudeal.bak-'\"\$(date +%Y%m%d%H%M%S)\"
             fi
             install -m 0755 /tmp/smudeal '$APP_DIR/smudeal'
             cp -r /tmp/smudeal-migrations/. '$APP_DIR/migrations/'
             systemctl restart '$SERVICE_NAME'
             sleep 5
             curl -fsS http://127.0.0.1:8080/healthz
             systemctl is-active --quiet '$SERVICE_NAME'
             systemctl status --no-pager --lines=20 '$SERVICE_NAME'"
